        * { margin: 0; padding: 0; box-sizing: border-box; }

        .video-background {
            position: fixed;
            top: 0;

            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;

            transform: scale(1.01);

        .ad-block {

        }
        .ad-block p {
            color: #cbd5e1;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .ad-block a {

            text-decoration: none;
            font-size: 0.75rem;
        }
        .ad-block a:hover {

        }
        
        .main-content {
            flex: 1;
            min-width: 0;

        .sticky-header {

            top: 20px;

        }
        .glass-header {

            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .avatar {

            height: 48px;
            border-radius: 50%;
            object-fit: cover;

        }

        }
        h1 {

            font-weight: 800;

            background-clip: text;
            color: transparent;
            margin: 0;

        .stats {

            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            color: white;
            display: inline-block;
        }
        
        .social-header {

            align-items: center;
            gap: 0.8rem;
        }
        .social-icon {

            height: 44px;
            border-radius: 50%;

            align-items: center;

            transition: all 0.25s ease;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .social-icon.vk {

            color: white;
        }
        .social-icon.tg {
            background: #26A5E4;
        }
        .social-icon:hover {
            transform: scale(1.08);
        }
        
        .user-info {
            background: rgba(0,0,0,0.5);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: flex-end;

        .auth-btn {

            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .auth-btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        
        .admin-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.2);

        .admin-panel h2 { color: white; margin-bottom: 1rem; font-size: 1.2rem; }

        .admin-panel button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .track-card {

            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 0.8rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);

            flex-wrap: wrap;
            align-items: flex-start;
            gap: 0.8rem;

        .track-card:hover {
            background: rgba(0, 0, 0, 0.8);

        .track-left {

            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            width: 70px;
            flex-shrink: 0;
        }
        .cover-container {

            width: 70px;
            height: 70px;

        .track-cover {

            height: 100%;
            border-radius: 0.8rem;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);

        .play-overlay {

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);

            height: 32px;

        .track-artist {

            color: #a0aec0;
            margin-bottom: 0.5rem;

            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.5rem;

        .volume-icon {
            font-size: 0.7rem;

            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
        
        .progress-control {
            display: none;
            margin-bottom: 0.5rem;
        }
        .progress-control.visible {
            display: block;
        }
        .progress-bar-container {
            background: rgba(255,255,255,0.2);
            border-radius: 1rem;
            height: 4px;
            cursor: pointer;
        }
        .progress-fill {
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            border-radius: 1rem;
            height: 100%;
            width: 0%;

        .delete-track-card:hover {

        .comment-date {

        .comment-text {

            border-radius: 1.5rem;

            padding: 0.6rem;
            background: rgba(0,0,0,0.7);
            color: white;
            margin: 0.5rem 0;

            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }
        .char-counter.warning { color: #ef4444; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;

        .modal-content {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);

            border-radius: 2rem;
            width: 90%;
            max-width: 400px;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .modal-content input {
            width: 100%;
            padding: 0.6rem 1rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            border: none;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
            box-sizing: border-box;
        }
        .modal-content button {
            width: 100%;
            padding: 0.6rem;
            margin: 0.5rem 0;
            background: #3b82f6;
            border: none;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        .modal-content .close {
            background: #ef4444;
        }
        
        .password-wrapper {
            position: relative;
            width: 100%;
            margin: 0.5rem 0;
        }
        .password-wrapper input {
            width: 100%;
            padding: 0.6rem 2.5rem 0.6rem 1rem;
            margin: 0;
            box-sizing: border-box;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
            user-select: none;
            transition: all 0.2s ease;
            color: #888;
        }
        .password-toggle:hover {
            color: #aaa;
        }
        .password-toggle.active {
            color: white;
            text-shadow: 0 0 4px #3b82f6;
        }
        
        .user-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
            color: white;
            pointer-events: none;
        }
        .user-panel-content {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .user-role {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
            background: rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }
        .user-role.admin {
            background: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .site-wrapper { 
                flex-direction: column; 
                gap: 0;
            }
            .ad-sidebar {
                display: none;
            }
            .main-content {
                max-width: 100%;
            }
            .sticky-header { top: 10px; }
            .glass-header {
                padding: 0.6rem 1rem;
                flex-direction: column;
                align-items: stretch;
                text-align: center;

            .header-left { justify-content: center; }
            .avatar { width: 40px; height: 40px; }
            h1 { font-size: 1rem; }
            .stats { font-size: 0.6rem; }
            .user-info { justify-content: center; font-size: 0.7rem; }
            .social-header { justify-content: center; }
            
            .track-left { width: 60px; }
            .cover-container { width: 60px; height: 60px; }
            .play-overlay { width: 28px; height: 28px; }
            .play-overlay span { font-size: 0.8rem; }
            
            .track-title { font-size: 0.9rem; }
            .track-artist { font-size: 0.7rem; }
            .volume-slider { width: 80px; }
            
            .admin-panel input { width: 100%; margin: 0.5rem 0; }
            .admin-panel button { width: 100%; }
            
            .comments-section h2 { font-size: 1.1rem; }
            
            .user-panel {

                left: 10px;
                padding: 0.3rem 0.8rem;
                font-size: 0.7rem;
            }
            .download-track-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.65rem;
            }
        }
    </style>
</head>

    function containsBadWords(text) {
        if (!text) return false;
        let lowerText = text.toLowerCase();
        for (const word of bannedWords) {

    async function getDeviceFingerprint() {
        if (deviceFingerprint) return deviceFingerprint;
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            deviceFingerprint = result.visitorId;
            return deviceFingerprint;
        } catch(e) {
            let fp = localStorage.getItem('fallback_fp');
            if (!fp) {
                fp = Math.random().toString(36).substr(2, 16);
                localStorage.setItem('fallback_fp', fp);
            }
            deviceFingerprint = fp;
            return deviceFingerprint;
        }
    }

    function isValidUsername(username) {
        const regex = /^[a-zA-Z]{3,8}$/;
        return regex.test(username);
    }

    function togglePassword(inputId, element) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            element.classList.add('active');
        } else {
            input.type = 'password';
            element.classList.remove('active');
        }
    }

    function showLoggedOutUI() {
        document.getElementById('userEmail').innerText = 'Гость';
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('registerBtn').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'none';
        const adminPanel = document.getElementById('adminPanel');
        if (adminPanel) adminPanel.style.display = 'none';
        
        const panelName = document.getElementById('userPanelName');
        const panelRole = document.getElementById('userPanelRole');
        if (panelName) panelName.innerText = 'Гость';
        if (panelRole) {
            panelRole.innerText = '';
            panelRole.classList.remove('admin');
        }
    }

    async function checkAuth() {
        const { data: { user }, error } = await supabaseClient.auth.getUser();
        
        if (error || !user) {
            currentUser = null;
            isAdmin = false;
            showLoggedOutUI();
            loadTracks();
            loadComments();
            return;
        }
        
        const { data: profile, error: profileError } = await supabaseClient
            .from('profiles')
            .select('role, username')
            .eq('id', user.id)
            .maybeSingle();
        
        if (profileError || !profile) {
            await supabaseClient.auth.signOut();
            currentUser = null;
            isAdmin = false;
            showLoggedOutUI();
            loadTracks();
            loadComments();
            return;
        }
        
        currentUser = user;
        isAdmin = profile.role === 'admin' || profile.role === 'tech_admin';
        const displayName = profile.username || 'Пользователь';
        
        document.getElementById('userEmail').innerText = displayName;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('registerBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'block';
        
        const adminPanel = document.getElementById('adminPanel');
        if (adminPanel) adminPanel.style.display = isAdmin ? 'block' : 'none';
        
        const panelName = document.getElementById('userPanelName');
        const panelRole = document.getElementById('userPanelRole');
        if (panelName) panelName.innerText = displayName;
        if (panelRole) {
            if (isAdmin) {
                panelRole.innerText = 'Админ';
                panelRole.classList.add('admin');
            } else {
                panelRole.innerText = 'Пользователь';
                panelRole.classList.remove('admin');
            }
        }
        
        loadTracks();
        loadComments();
    }

    async function login(email, password) {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) {
            if (error.message.includes('Invalid login credentials')) {
                alert('❌ Такой учётной записи нет. Проверьте email или пароль.');
            } else {
                alert('Ошибка входа: ' + error.message);
            }
            return;
        }
        
        closeModal();
        checkAuth();
    }
