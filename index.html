<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный проект — 68 (ТЕСТ)</title>
    <link rel="icon" type="image/png" href="https://github.com/geratiina/music-supabase/raw/main/avatar.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: blur(5px);
            transform: scale(1.01);
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .sticky-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            max-width: 1200px;
            margin: 0 auto 1.5rem auto;
        }
        .glass-header {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.5);
        }
        .title-stats {
            text-align: left;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #e0e7ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }
        .stats {
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            color: white;
            display: inline-block;
        }
        .user-info {
            background: rgba(0,0,0,0.5);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .user-info button {
            background: #3b82f6;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 1.5rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .admin-panel h2 { color: white; margin-bottom: 1rem; font-size: 1.2rem; }
        .admin-panel input {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 2rem;
            background: rgba(255,255,255,0.9);
            width: calc(50% - 0.8rem);
            margin: 0.5rem 0.5rem 0.5rem 0;
        }
        .admin-panel button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* СЕТКА ТРЕКОВ (2-3 в строку) */
        .track-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        
        /* КАРТОЧКА ТРЕКА (как плитка) */
        .track-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 1rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .track-card:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateY(-3px);
        }
        
        /* КОНТЕЙНЕР С АВАТАРКОЙ И КНОПКОЙ PLAY ПО ЦЕНТРУ */
        .cover-container {
            position: relative;
            width: 100%;
            max-width: 180px;
            margin: 0 auto;
        }
        .track-cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 0.8rem;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .play-overlay:hover {
            background: #3b82f6;
            transform: translate(-50%, -50%) scale(1.05);
        }
        .play-overlay span {
            font-size: 1.5rem;
            color: white;
        }
        
        /* ИНФОРМАЦИЯ О ТРЕКЕ */
        .track-title {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin-top: 0.8rem;
            margin-bottom: 0.2rem;
            word-break: break-word;
        }
        .track-artist {
            font-size: 0.8rem;
            color: #a0aec0;
            margin-bottom: 0.5rem;
        }
        
        /* ПОЛЗУНОК ГРОМКОСТИ (рядом с аватаркой) */
        .volume-control-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            width: 100%;
        }
        .volume-icon-card {
            font-size: 0.8rem;
            color: white;
        }
        .volume-slider-card {
            width: 80px;
            height: 3px;
            cursor: pointer;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        .volume-slider-card::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
        
        /* ЛАЙК И ВРЕМЯ (тайминг появляется только при воспроизведении) */
        .likes-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .like-btn-card {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 0.2rem 0.8rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .like-btn-card.liked {
            background: #ef4444;
            color: white;
        }
        .time-card {
            font-size: 0.7rem;
            color: #a0aec0;
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            display: none;
        }
        .time-card.visible {
            display: inline-block;
        }
        .delete-track-card {
            background: #ef4444;
            border: none;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }
        
        .comments-section { margin-top: 2rem; }
        .comments-section h2 {
            font-size: 1.3rem;
            color: white;
            margin-bottom: 1rem;
        }
        .comment {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 1.2rem;
            padding: 0.6rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .comment-author { font-weight: bold; color: #e0e7ff; font-size: 0.9rem; }
        .comment-date { font-size: 0.65rem; color: #cbd5e1; margin-left: 0.5rem; }
        .comment-text { color: white; margin-top: 0.2rem; font-size: 0.9rem; }
        textarea {
            width: 100%;
            border-radius: 1.5rem;
            border: none;
            padding: 0.6rem;
            background: rgba(0,0,0,0.7);
            color: white;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        .send-btn {
            background: linear-gradient(135deg, #2b2b4f, #1e1a3a);
            color: white;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .char-counter {
            text-align: right;
            font-size: 0.7rem;
            color: #cbd5e1;
        }
        .char-counter.warning { color: #ef4444; }
        .social-buttons {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            z-index: 1000;
        }
        .social-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            text-decoration: none;
            color: white;
            text-align: center;
            font-size: 0.85rem;
        }
        .vk-btn { background: rgba(45, 62, 90, 0.9); }
        .tg-btn { background: rgba(0, 136, 204, 0.9); }
        .empty-message { text-align: center; padding: 2rem; color: white; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 2rem;
            width: 90%;
            max-width: 400px;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .modal-content input {
            width: 100%;
            padding: 0.6rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            border: none;
        }
        .modal-content button {
            width: 100%;
            padding: 0.6rem;
            margin: 0.5rem 0;
            background: #3b82f6;
            border: none;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        .modal-content .close {
            background: #ef4444;
        }
        .switch-form {
            text-align: center;
            margin-top: 1rem;
            cursor: pointer;
            color: #3b82f6;
        }
        @media (max-width: 768px) {
            .glass-header { flex-direction: column; align-items: stretch; text-align: center; }
            .header-left { justify-content: center; }
            h1 { font-size: 1.2rem; text-align: center; }
            .admin-panel input { width: 100%; margin: 0.5rem 0; }
            .admin-panel button { width: 100%; }
            .user-info { justify-content: center; }
            .track-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<video class="video-background" autoplay loop muted playsinline>
    <source src="https://github.com/geratiina/back/raw/main/background.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="sticky-header">
    <div class="glass-header">
        <div class="header-left">
            <img src="https://github.com/geratiina/music-supabase/raw/main/avatar.png" alt="avatar" class="avatar" onerror="this.style.display='none'">
            <div class="title-stats">
                <h1>🎵 МУЗЫКАЛЬНЫЙ ПРОЕКТ — 68 (ТЕСТ)</h1>
                <div class="stats" id="statsPanel">📊 загрузка...</div>
            </div>
        </div>
        <div class="user-info" id="userInfo">
            <span id="userEmail">Гость</span>
            <button id="authBtn">Войти</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h2>➕ Добавить трек</h2>
        <input type="text" id="trackTitle" placeholder="Название трека">
        <input type="text" id="trackArtist" placeholder="Исполнитель">
        <input type="text" id="trackUrl" placeholder="https://audio.jukehost.co.uk/...">
        <button id="addTrackBtn">Добавить</button>
        <div id="uploadStatus" style="color:#a5f3fc; margin-top:0.5rem;"></div>
    </div>
    <div id="trackList" class="track-grid"></div>
    <div class="comments-section">
        <h2>💬 Обсуждение</h2>
        <div id="commentsList"></div>
        <textarea id="commentInput" rows="2" placeholder="Напиши свой комментарий... (до 250 символов)"></textarea>
        <div id="charCounter" class="char-counter">0 / 250</div>
        <button id="sendCommentBtn" class="send-btn">📝 Отправить</button>
    </div>
</div>

<div class="social-buttons">
    <a href="https://vk.com/mzproect_68" target="_blank" class="social-btn vk-btn">📱 ВКонтакте</a>
    <a href="https://t.me/rn_68a_muz" target="_blank" class="social-btn tg-btn">✈️ Telegram</a>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Вход</h2>
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Пароль">
        <button id="submitAuthBtn">Войти</button>
        <button class="close" onclick="closeModal()">Закрыть</button>
        <div class="switch-form" onclick="toggleAuthForm()">Нет аккаунта? Зарегистрироваться</div>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient(
        'https://efaqqrfkxxgfsxndmyit.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmYXFxcmZreHhnZnN4bmRteWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTMxMDQsImV4cCI6MjA5NTA4OTEwNH0.72YBkhIuYy_2agG8gbXxOpC4JpG__rWQvbJpK4WMugs'
    );
    
    let currentUser = null;
    let isAdmin = false;
    let deviceFingerprint = null;
    let currentAuthMode = 'login';

    async function getDeviceFingerprint() {
        if (deviceFingerprint) return deviceFingerprint;
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            deviceFingerprint = result.visitorId;
            return deviceFingerprint;
        } catch(e) {
            let fp = localStorage.getItem('fallback_fp');
            if (!fp) {
                fp = Math.random().toString(36).substr(2, 16);
                localStorage.setItem('fallback_fp', fp);
            }
            deviceFingerprint = fp;
            return deviceFingerprint;
        }
    }

    async function checkAuth() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        currentUser = user;
        if (user) {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('role, email')
                .eq('id', user.id)
                .single();
            isAdmin = profile?.role === 'admin';
            document.getElementById('userEmail').innerText = profile?.email || user.email;
            document.getElementById('authBtn').innerText = 'Выйти';
            const adminPanel = document.getElementById('adminPanel');
            if (adminPanel) adminPanel.style.display = isAdmin ? 'block' : 'none';
        } else {
            isAdmin = false;
            document.getElementById('userEmail').innerText = 'Гость';
            document.getElementById('authBtn').innerText = 'Войти';
            const adminPanel = document.getElementById('adminPanel');
            if (adminPanel) adminPanel.style.display = 'none';
        }
        loadTracks();
        loadComments();
    }

    async function login(email, password) {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) return alert('Ошибка входа: ' + error.message);
        closeModal();
        checkAuth();
    }

    async function register(email, password) {
        const { error } = await supabaseClient.auth.signUp({ email, password });
        if (error) return alert('Ошибка регистрации: ' + error.message);
        alert('Регистрация успешна! Теперь войдите.');
        toggleAuthForm();
    }

    function logout() {
        supabaseClient.auth.signOut();
        checkAuth();
    }

    const modal = document.getElementById('authModal');
    function openModal() { modal.style.display = 'flex'; }
    function closeModal() { modal.style.display = 'none'; }
    function toggleAuthForm() {
        if (currentAuthMode === 'login') {
            currentAuthMode = 'register';
            document.getElementById('modalTitle').innerText = 'Регистрация';
            document.getElementById('submitAuthBtn').innerText = 'Зарегистрироваться';
            document.querySelector('.switch-form').innerText = 'Уже есть аккаунт? Войти';
        } else {
            currentAuthMode = 'login';
            document.getElementById('modalTitle').innerText = 'Вход';
            document.getElementById('submitAuthBtn').innerText = 'Войти';
            document.querySelector('.switch-form').innerText = 'Нет аккаунта? Зарегистрироваться';
        }
    }

    document.getElementById('authBtn').onclick = () => {
        if (currentUser) logout();
        else openModal();
    };
    document.getElementById('submitAuthBtn').onclick = () => {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        if (!email || !pass) return alert('Заполните поля');
        if (currentAuthMode === 'login') login(email, pass);
        else register(email, pass);
    };

    async function likeTrack(trackId) {
        const fingerprint = await getDeviceFingerprint();
        const userId = currentUser?.id || null;
        const { error } = await supabaseClient.from('likes').insert({
            track_id: trackId,
            user_id: userId,
            device_fingerprint: userId ? null : fingerprint
        });
        if (error) {
            if (error.message.includes('unique')) alert('Вы уже лайкали этот трек');
            else alert('Ошибка: ' + error.message);
        } else {
            loadTracks();
        }
    }

    async function addComment(text) {
        if (!currentUser) return alert('Войдите в аккаунт, чтобы комментировать');
        if (!text.trim()) return alert('Напишите что-нибудь');
        if (text.length > 250) return alert('Максимум 250 символов');
        const { error } = await supabaseClient.from('comments').insert({
            text: text.trim(),
            user_id: currentUser.id
        });
        if (error) alert('Ошибка: ' + error.message);
        else {
            document.getElementById('commentInput').value = '';
            document.getElementById('charCounter').innerText = '0 / 250';
            alert('✅ Комментарий добавлен');
            loadComments();
        }
    }

    async function loadTracks() {
        const container = document.getElementById('trackList');
        container.innerHTML = '<div class="empty-message">⏳ Загрузка...</div>';
        const { data, error } = await supabaseClient.from('tracks').select('*').order('created_at', { ascending: false });
        if (error || !data?.length) {
            container.innerHTML = '<div class="empty-message">🎧 Пока нет треков</div>';
            updateStats(); 
            return;
        }
        
        const fingerprint = await getDeviceFingerprint();
        let userLikes = [];
        if (currentUser) {
            const { data: likes } = await supabaseClient.from('likes').select('track_id').eq('user_id', currentUser.id);
            userLikes = likes.map(l => l.track_id);
        } else {
            const { data: likes } = await supabaseClient.from('likes').select('track_id').eq('device_fingerprint', fingerprint);
            userLikes = likes.map(l => l.track_id);
        }
        
        let html = '';
        data.forEach((track, index) => {
            const isLiked = userLikes.includes(track.id);
            html += `
                <div class="track-card" data-track-id="${track.id}" data-index="${index}">
                    <div class="cover-container">
                        <img class="track-cover" src="https://github.com/geratiina/music-supabase/raw/main/avatar.png" alt="cover" onerror="this.src='https://placehold.co/180x180/2b2b4f/white?text=🎵'">
                        <div class="play-overlay" data-play-index="${index}">
                            <span>▶</span>
                        </div>
                    </div>
                    <div class="track-title">${escapeHtml(track.title)}</div>
                    <div class="track-artist">${escapeHtml(track.artist || 'Неизвестный исполнитель')}</div>
                    
                    <div class="volume-control-card">
                        <span class="volume-icon-card">🔊</span>
                        <input type="range" class="volume-slider-card" min="0" max="100" value="70">
                    </div>
                    
                    <div class="likes-row">
                        <button class="like-btn-card ${isLiked ? 'liked' : ''}" data-id="${track.id}">👍 ${track.likes || 0}</button>
                        <span class="time-card" id="time-${track.id}">00:00 / 00:00</span>
                        ${isAdmin ? `<button class="delete-track-card" onclick="deleteTrack(${track.id})">🗑️</button>` : ''}
                    </div>
                    <audio style="display:none;" id="audio-${track.id}" preload="metadata">
                        <source src="${track.file_url}" type="audio/mpeg">
                    </audio>
                </div>
            `;
        });
        container.innerHTML = html;
        
        // Инициализация плееров
        data.forEach((track, index) => {
            initPlayerForTrack(track.id, index);
        });
        
        // Инициализация лайков
        document.querySelectorAll('.like-btn-card').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                likeTrack(parseInt(btn.dataset.id));
            };
        });
        
        updateStats();
    }
    
    function initPlayerForTrack(trackId, index) {
        const audio = document.getElementById(`audio-${trackId}`);
        const playBtn = document.querySelector(`.play-overlay[data-play-index="${index}"]`);
        const timeSpan = document.getElementById(`time-${trackId}`);
        const volumeSlider = document.querySelector(`.volume-slider-card`);
        const volumeIcon = document.querySelector(`.volume-icon-card`);
        
        if (!audio || !playBtn) return;
        
        let isPlaying = false;
        
        audio.addEventListener('loadedmetadata', () => {
            if (timeSpan && !isPlaying) {
                timeSpan.classList.remove('visible');
            }
        });
        
        audio.addEventListener('timeupdate', () => {
            if (timeSpan && isPlaying) {
                timeSpan.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
            }
        });
        
        function updateTimeDisplay() {
            if (timeSpan && isPlaying) {
                timeSpan.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
            }
        }
        
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '<span>▶</span>';
                if (timeSpan) timeSpan.classList.remove('visible');
            } else {
                document.querySelectorAll('audio').forEach(a => {
                    if (a !== audio && !a.paused) {
                        a.pause();
                        const btn = document.querySelector(`.play-overlay[data-play-index="${a.id?.replace('audio-', '')}"]`);
                        if (btn) btn.innerHTML = '<span>▶</span>';
                        const tSpan = document.getElementById(`time-${a.id?.replace('audio-', '')}`);
                        if (tSpan) tSpan.classList.remove('visible');
                    }
                });
                audio.play();
                playBtn.innerHTML = '<span>⏸</span>';
                if (timeSpan) {
                    timeSpan.classList.add('visible');
                    updateTimeDisplay();
                }
            }
            isPlaying = !isPlaying;
        });
        
        audio.addEventListener('ended', () => {
            playBtn.innerHTML = '<span>▶</span>';
            if (timeSpan) timeSpan.classList.remove('visible');
            isPlaying = false;
        });
        
        // Громкость
        if (volumeSlider) {
            volumeSlider.addEventListener('input', (e) => {
                audio.volume = e.target.value / 100;
                if (volumeIcon) {
                    if (audio.volume === 0) volumeIcon.textContent = '🔇';
                    else if (audio.volume < 0.5) volumeIcon.textContent = '🔉';
                    else volumeIcon.textContent = '🔊';
                }
            });
            audio.volume = 0.7;
        }
    }

    async function deleteTrack(id) {
        if (!isAdmin) return;
        if (confirm('Удалить трек?')) {
            await supabaseClient.from('tracks').delete().eq('id', id);
            loadTracks();
        }
    }

    async function addTrack(title, artist, url) {
        if (!isAdmin) return alert('⛔ Только админ');
        if (!title.trim() || !artist.trim() || !url.trim()) return alert('Заполните все поля');
        const { error } = await supabaseClient.from('tracks').insert([{ 
            title: title.trim(), 
            artist: artist.trim(),
            file_url: url.trim(), 
            likes: 0 
        }]);
        if (error) alert('Ошибка: ' + error.message);
        else {
            alert('✅ Трек добавлен');
            document.getElementById('trackTitle').value = '';
            document.getElementById('trackArtist').value = '';
            document.getElementById('trackUrl').value = '';
            loadTracks();
        }
    }

    async function loadComments() {
        const container = document.getElementById('commentsList');
        const { data, error } = await supabaseClient.from('comments').select('*, profiles(email)').order('created_at', { ascending: false });
        if (error || !data?.length) { 
            container.innerHTML = '<div class="empty-message">💭 Будь первым!</div>'; 
            return; 
        }
        let html = '';
        for (const c of data) {
            const author = c.profiles?.email || 'Гость';
            html += `<div class="comment">
                        <div>
                            <span class="comment-author">💬 ${escapeHtml(author)}</span> 
                            <span class="comment-date">${new Date(c.created_at).toLocaleString()}</span>
                            <div class="comment-text">${escapeHtml(c.text)}</div>
                        </div>
                        ${isAdmin ? `<button onclick="deleteComment(${c.id})" style="background:#ef4444; border:none; color:white; border-radius:2rem; padding:0.2rem 0.7rem; cursor:pointer;">🗑️</button>` : ''}
                    </div>`;
        }
        container.innerHTML = html;
    }

    async function deleteComment(id) {
        if (!isAdmin) return;
        if (confirm('Удалить комментарий?')) {
            await supabaseClient.from('comments').delete().eq('id', id);
            loadComments();
        }
    }

    async function updateStats() {
        const { count: tracksCount } = await supabaseClient.from('tracks').select('*', { count: 'exact', head: true });
        const { count: commentsCount } = await supabaseClient.from('comments').select('*', { count: 'exact', head: true });
        document.getElementById('statsPanel').innerHTML = `📊 ${tracksCount || 0} треков · 💬 ${commentsCount || 0} комментариев`;
    }

    function formatTime(sec) { 
        if (isNaN(sec)) return '00:00'; 
        const m = Math.floor(sec / 60); 
        const s = Math.floor(sec % 60); 
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; 
    }

    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
    }

    document.getElementById('addTrackBtn').onclick = () => addTrack(
        document.getElementById('trackTitle').value,
        document.getElementById('trackArtist').value,
        document.getElementById('trackUrl').value
    );
    document.getElementById('sendCommentBtn').onclick = () => addComment(document.getElementById('commentInput').value);
    document.getElementById('commentInput').addEventListener('input', function() { 
        const len = this.value.length; 
        const counter = document.getElementById('charCounter'); 
        counter.innerText = `${len} / 250`; 
        if (len > 250) counter.classList.add('warning'); 
        else counter.classList.remove('warning'); 
    });

    checkAuth();
</script>
</body>
</html>
