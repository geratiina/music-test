<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный проект — 68</title>
    <link rel="icon" type="image/png" href="https://github.com/geratiina/music-supabase/raw/main/avatar.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: blur(5px);
            transform: scale(1.01);
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .sticky-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            max-width: 1000px;
            margin: 0 auto 1.5rem auto;
        }
        .glass-header {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.5);
        }
        .title-stats {
            text-align: left;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #e0e7ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }
        .stats {
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            color: white;
            display: inline-block;
        }
        .user-info {
            background: rgba(0,0,0,0.5);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .user-info button {
            background: #3b82f6;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 1.5rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .main-content {
            max-width: 1000px;
            margin: 0 auto;
        }
        .admin-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .admin-panel h2 { color: white; margin-bottom: 1rem; font-size: 1.2rem; }
        .admin-panel input {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 2rem;
            background: rgba(255,255,255,0.9);
            width: calc(50% - 0.8rem);
            margin: 0.5rem 0.5rem 0.5rem 0;
        }
        .admin-panel button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .player-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .player-card:hover { background: rgba(0, 0, 0, 0.8); transform: translateY(-2px); }
        .track-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.5rem;
        }
        .progress-area { margin: 0.5rem 0; }
        .progress-bar-container {
            background: rgba(255,255,255,0.3);
            border-radius: 1rem;
            height: 6px;
            cursor: pointer;
        }
        .progress-fill {
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            border-radius: 1rem;
            height: 100%;
            width: 0%;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #cbd5e1;
            margin-top: 0.2rem;
        }
        .controls-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        .play-controls { display: flex; gap: 0.5rem; align-items: center; }
        .play-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .volume-control {
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            display: flex;
            gap: 0.3rem;
            align-items: center;
        }
        .volume-slider { width: 60px; cursor: pointer; }
        .like-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(239,68,68,0.6);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .like-btn.liked { background: #ef4444; color: white; }
        .delete-track-btn {
            background: #ef4444;
            border: none;
            color: white;
            padding: 0.3rem 0.7rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .comments-section { margin-top: 2rem; }
        .comments-section h2 {
            font-size: 1.3rem;
            color: white;
            margin-bottom: 1rem;
        }
        .comment {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 1.2rem;
            padding: 0.6rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .comment-author { font-weight: bold; color: #e0e7ff; font-size: 0.9rem; }
        .comment-date { font-size: 0.65rem; color: #cbd5e1; margin-left: 0.5rem; }
        .comment-text { color: white; margin-top: 0.2rem; font-size: 0.9rem; }
        textarea {
            width: 100%;
            border-radius: 1.5rem;
            border: none;
            padding: 0.6rem;
            background: rgba(0,0,0,0.7);
            color: white;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        .send-btn {
            background: linear-gradient(135deg, #2b2b4f, #1e1a3a);
            color: white;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .char-counter {
            text-align: right;
            font-size: 0.7rem;
            color: #cbd5e1;
        }
        .char-counter.warning { color: #ef4444; }
        .social-buttons {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            z-index: 1000;
        }
        .social-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            text-decoration: none;
            color: white;
            text-align: center;
            font-size: 0.85rem;
        }
        .vk-btn { background: rgba(45, 62, 90, 0.9); }
        .tg-btn { background: rgba(0, 136, 204, 0.9); }
        .empty-message { text-align: center; padding: 2rem; color: white; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 2rem;
            width: 90%;
            max-width: 400px;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .modal-content input {
            width: 100%;
            padding: 0.6rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            border: none;
        }
        .modal-content button {
            width: 100%;
            padding: 0.6rem;
            margin: 0.5rem 0;
            background: #3b82f6;
            border: none;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        .modal-content .close {
            background: #ef4444;
        }
        .switch-form {
            text-align: center;
            margin-top: 1rem;
            cursor: pointer;
            color: #3b82f6;
        }
        @media (max-width: 768px) {
            .glass-header { flex-direction: column; align-items: stretch; text-align: center; }
            .header-left { justify-content: center; }
            h1 { font-size: 1.2rem; text-align: center; }
            .admin-panel input { width: 100%; margin: 0.5rem 0; }
            .admin-panel button { width: 100%; }
            .user-info { justify-content: center; }
        }
    </style>
</head>
<body>

<video class="video-background" autoplay loop muted playsinline>
    <source src="https://github.com/geratiina/back/raw/main/background.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="sticky-header">
    <div class="glass-header">
        <div class="header-left">
            <img src="https://github.com/geratiina/music-supabase/raw/main/avatar.png" alt="avatar" class="avatar" onerror="this.style.display='none'">
            <div class="title-stats">
                <h1>🎵 МУЗЫКАЛЬНЫЙ ПРОЕКТ — 68</h1>
                <div class="stats" id="statsPanel">📊 загрузка...</div>
            </div>
        </div>
        <div class="user-info" id="userInfo">
            <span id="userEmail">Гость</span>
            <button id="authBtn">Войти</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h2>➕ Добавить трек</h2>
        <input type="text" id="trackTitle" placeholder="Название трека">
        <input type="text" id="trackUrl" placeholder="https://audio.jukehost.co.uk/...">
        <button id="addTrackBtn">Добавить</button>
        <div id="uploadStatus" style="color:#a5f3fc; margin-top:0.5rem;"></div>
    </div>
    <div id="trackList"></div>
    <div class="comments-section">
        <h2>💬 Обсуждение</h2>
        <div id="commentsList"></div>
        <textarea id="commentInput" rows="2" placeholder="Напиши свой комментарий... (до 250 символов)"></textarea>
        <div id="charCounter" class="char-counter">0 / 250</div>
        <button id="sendCommentBtn" class="send-btn">📝 Отправить</button>
    </div>
</div>

<div class="social-buttons">
    <a href="https://vk.com/mzproect_68" target="_blank" class="social-btn vk-btn">📱 ВКонтакте</a>
    <a href="https://t.me/rn_68a_muz" target="_blank" class="social-btn tg-btn">✈️ Telegram</a>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Вход</h2>
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Пароль">
        <button id="submitAuthBtn">Войти</button>
        <button class="close" onclick="closeModal()">Закрыть</button>
        <div class="switch-form" onclick="toggleAuthForm()">Нет аккаунта? Зарегистрироваться</div>
    </div>
</div>

<script>
    // ========== SUPABASE ==========
    const supabaseClient = window.supabase.createClient(
        'https://efaqqrfkxxgfsxndmyit.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmYXFxcmZreHhnZnN4bmRteWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTMxMDQsImV4cCI6MjA5NTA4OTEwNH0.72YBkhIuYy_2agG8gbXxOpC4JpG__rWQvbJpK4WMugs'
    );
    
    let currentUser = null;
    let isAdmin = false;
    let deviceFingerprint = null;
    let currentAuthMode = 'login';

    async function getDeviceFingerprint() {
        if (deviceFingerprint) return deviceFingerprint;
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            deviceFingerprint = result.visitorId;
            return deviceFingerprint;
        } catch(e) {
            let fp = localStorage.getItem('fallback_fp');
            if (!fp) {
                fp = Math.random().toString(36).substr(2, 16);
                localStorage.setItem('fallback_fp', fp);
            }
            deviceFingerprint = fp;
            return deviceFingerprint;
        }
    }

    async function checkAuth() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        currentUser = user;
        if (user) {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('role, email')
                .eq('id', user.id)
                .single();
            isAdmin = profile?.role === 'admin';
            document.getElementById('userEmail').innerText = profile?.email || user.email;
            document.getElementById('authBtn').innerText = 'Выйти';
            const adminPanel = document.getElementById('adminPanel');
            if (adminPanel) adminPanel.style.display = isAdmin ? 'block' : 'none';
        } else {
            isAdmin = false;
            document.getElementById('userEmail').innerText = 'Гость';
            document.getElementById('authBtn').innerText = 'Войти';
            const adminPanel = document.getElementById('adminPanel');
            if (adminPanel) adminPanel.style.display = 'none';
        }
        loadTracks();
        loadComments();
    }

    async function login(email, password) {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) return alert('Ошибка входа: ' + error.message);
        closeModal();
        checkAuth();
    }

    async function register(email, password) {
        const { error } = await supabaseClient.auth.signUp({ email, password });
        if (error) return alert('Ошибка регистрации: ' + error.message);
        alert('Регистрация успешна! Теперь войдите.');
        toggleAuthForm();
    }

    function logout() {
        supabaseClient.auth.signOut();
        checkAuth();
    }

    const modal = document.getElementById('authModal');
    function openModal() { modal.style.display = 'flex'; }
    function closeModal() { modal.style.display = 'none'; }
    function toggleAuthForm() {
        if (currentAuthMode === 'login') {
            currentAuthMode = 'register';
            document.getElementById('modalTitle').innerText = 'Регистрация';
            document.getElementById('submitAuthBtn').innerText = 'Зарегистрироваться';
            document.querySelector('.switch-form').innerText = 'Уже есть аккаунт? Войти';
        } else {
            currentAuthMode = 'login';
            document.getElementById('modalTitle').innerText = 'Вход';
            document.getElementById('submitAuthBtn').innerText = 'Войти';
            document.querySelector('.switch-form').innerText = 'Нет аккаунта? Зарегистрироваться';
        }
    }

    document.getElementById('authBtn').onclick = () => {
        if (currentUser) logout();
        else openModal();
    };
    document.getElementById('submitAuthBtn').onclick = () => {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        if (!email || !pass) return alert('Заполните поля');
        if (currentAuthMode === 'login') login(email, pass);
        else register(email, pass);
    };

    async function likeTrack(trackId) {
        const fingerprint = await getDeviceFingerprint();
        const userId = currentUser?.id || null;
        const { error } = await supabaseClient.from('likes').insert({
            track_id: trackId,
            user_id: userId,
            device_fingerprint: userId ? null : fingerprint
        });
        if (error) {
            if (error.message.includes('unique')) alert('Вы уже лайкали этот трек');
            else alert('Ошибка: ' + error.message);
        } else {
            loadTracks();
        }
    }

    async function addComment(text) {
        if (!currentUser) return alert('Войдите в аккаунт, чтобы комментировать');
        if (!text.trim()) return alert('Напишите что-нибудь');
        if (text.length > 250) return alert('Максимум 250 символов');
        const { error } = await supabaseClient.from('comments').insert({
            text: text.trim(),
            user_id: currentUser.id
        });
        if (error) alert('Ошибка: ' + error.message);
        else {
            document.getElementById('commentInput').value = '';
            document.getElementById('charCounter').innerText = '0 / 250';
            alert('✅ Комментарий добавлен');
            loadComments();
        }
    }

    async function loadTracks() {
        const container = document.getElementById('trackList');
        container.innerHTML = '<div class="empty-message">⏳ Загрузка...</div>';
        const { data, error } = await supabaseClient.from('tracks').select('*').order('created_at', { ascending: false });
        if (error || !data?.length) {
            container.innerHTML = '<div class="empty-message">🎧 Пока нет треков</div>';
            updateStats(); 
            return;
        }
        let html = '';
        const fingerprint = await getDeviceFingerprint();
        for (const track of data) {
            let liked = false;
            if (currentUser) {
                const { data: likeData } = await supabaseClient.from('likes').select('id').eq('track_id', track.id).eq('user_id', currentUser.id).maybeSingle();
                liked = !!likeData;
            } else {
                const { data: likeData } = await supabaseClient.from('likes').select('id').eq('track_id', track.id).eq('device_fingerprint', fingerprint).maybeSingle();
                liked = !!likeData;
            }
            html += `<div class="player-card" data-track-id="${track.id}">
                <div class="track-title">${escapeHtml(track.title)}</div>
                <div class="progress-area">
                    <div class="progress-bar-container"><div class="progress-fill"></div></div>
                    <div class="time-info"><span class="current-time">00:00</span><span class="duration">00:00</span></div>
                </div>
                <div class="controls-area">
                    <div class="play-controls">
                        <button class="play-btn">▶</button>
                        <div class="volume-control"><span>🔊</span><input type="range" class="volume-slider" min="0" max="100" value="70"></div>
                    </div>
                    <div style="display:flex; gap:0.5rem;">
                        <button class="like-btn ${liked ? 'liked' : ''}" data-id="${track.id}" data-likes="${track.likes || 0}">👍 ${track.likes || 0}</button>
                        ${isAdmin ? `<button class="delete-track-btn" onclick="deleteTrack(${track.id})">🗑️ Удалить</button>` : ''}
                    </div>
                </div>
                <audio style="display:none;"><source src="${track.file_url}" type="audio/mpeg"></audio>
            </div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.player-card').forEach(card => initPlayer(card));
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.onclick = () => likeTrack(parseInt(btn.dataset.id));
        });
        updateStats();
    }

    async function deleteTrack(id) {
        if (!isAdmin) return;
        if (confirm('Удалить трек?')) {
            await supabaseClient.from('tracks').delete().eq('id', id);
            loadTracks();
        }
    }

    async function addTrack(title, url) {
        if (!isAdmin) return alert('⛔ Только админ');
        if (!title.trim() || !url.trim()) return alert('Заполните все поля');
        const { error } = await supabaseClient.from('tracks').insert([{ title: title.trim(), file_url: url.trim(), likes: 0 }]);
        if (error) alert('Ошибка: ' + error.message);
        else {
            alert('✅ Трек добавлен');
            document.getElementById('trackTitle').value = '';
            document.getElementById('trackUrl').value = '';
            loadTracks();
        }
    }

    async function loadComments() {
        const container = document.getElementById('commentsList');
        const { data, error } = await supabaseClient.from('comments').select('*, profiles(email)').order('created_at', { ascending: false });
        if (error || !data?.length) { 
            container.innerHTML = '<div class="empty-message">💭 Будь первым!</div>'; 
            return; 
        }
        let html = '';
        for (const c of data) {
            const author = c.profiles?.email || 'Гость';
            html += `<div class="comment">
                        <div>
                            <span class="comment-author">💬 ${escapeHtml(author)}</span> 
                            <span class="comment-date">${new Date(c.created_at).toLocaleString()}</span>
                            <div class="comment-text">${escapeHtml(c.text)}</div>
                        </div>
                        ${isAdmin ? `<button onclick="deleteComment(${c.id})" style="background:#ef4444; border:none; color:white; border-radius:2rem; padding:0.2rem 0.7rem; cursor:pointer;">🗑️</button>` : ''}
                    </div>`;
        }
        container.innerHTML = html;
    }

    async function deleteComment(id) {
        if (!isAdmin) return;
        if (confirm('Удалить комментарий?')) {
            await supabaseClient.from('comments').delete().eq('id', id);
            loadComments();
        }
    }

    async function updateStats() {
        const { count: tracksCount } = await supabaseClient.from('tracks').select('*', { count: 'exact', head: true });
        const { count: commentsCount } = await supabaseClient.from('comments').select('*', { count: 'exact', head: true });
        document.getElementById('statsPanel').innerHTML = `📊 ${tracksCount || 0} треков · 💬 ${commentsCount || 0} комментариев`;
    }

    function initPlayer(card) {
        const audio = card.querySelector('audio');
        const playBtn = card.querySelector('.play-btn');
        const progressBar = card.querySelector('.progress-bar-container');
        const progressFill = card.querySelector('.progress-fill');
        const currentSpan = card.querySelector('.current-time');
        const durationSpan = card.querySelector('.duration');
        const volumeSlider = card.querySelector('.volume-slider');
        let isPlaying = false;

        audio.addEventListener('loadedmetadata', () => {
            durationSpan.textContent = formatTime(audio.duration);
        });
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentSpan.textContent = formatTime(audio.currentTime);
        });
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
            } else {
                document.querySelectorAll('.player-card audio').forEach(a => {
                    if (a !== audio && !a.paused) {
                        a.pause();
                        const otherCard = a.closest('.player-card');
                        if (otherCard) otherCard.querySelector('.play-btn').textContent = '▶';
                    }
                });
                audio.play();
                playBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        });
        audio.addEventListener('ended', () => {
            playBtn.textContent = '▶';
            isPlaying = false;
        });
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });
        audio.volume = 0.7;
    }

    function formatTime(sec) { 
        if (isNaN(sec)) return '00:00'; 
        const m = Math.floor(sec / 60); 
        const s = Math.floor(sec % 60); 
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; 
    }

    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
    }

    document.getElementById('addTrackBtn').onclick = () => addTrack(document.getElementById('trackTitle').value, document.getElementById('trackUrl').value);
    document.getElementById('sendCommentBtn').onclick = () => addComment(document.getElementById('commentInput').value);
    document.getElementById('commentInput').addEventListener('input', function() { 
        const len = this.value.length; 
        const counter = document.getElementById('charCounter'); 
        counter.innerText = `${len} / 250`; 
        if (len > 250) counter.classList.add('warning'); 
        else counter.classList.remove('warning'); 
    });

    checkAuth();
</script>
</body>
</html>
